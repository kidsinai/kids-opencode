# Purpose: exercise the schema + scaffold-renderer codepaths in CI when the
# private kids-flows submodule isn't checked out. Not shown in the kid-facing
# picker (directories starting with `_` are filtered in
# packages/kids-client/src/core/course-pack.ts listInstalledPacks()).
